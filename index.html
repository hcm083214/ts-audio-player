<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>网易云音乐</title>
  <link rel="stylesheet" href="./src/styles/index.css" />
</head>

<body>
  <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" style="display: none;">
    <!-- search icon -->
    <symbol id="icon-search" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8" fill="none" stroke="currentColor" stroke-width="2"></circle>
      <line x1="21" y1="21" x2="16.65" y2="16.65" stroke="currentColor" stroke-width="2"></line>
    </symbol>

    <!-- arrow-left icon -->
    <symbol id="icon-arrow-left" viewBox="0 0 24 24">
      <polyline points="15 18 9 12 15 6" fill="none" stroke="currentColor" stroke-width="2"></polyline>
    </symbol>

    <!-- skip-previous icon -->
    <symbol id="icon-skip-previous" viewBox="0 0 24 24">
      <polygon points="19 20 9 12 19 4 19 20" fill="currentColor"></polygon>
    </symbol>

    <!-- play icon -->
    <symbol id="icon-play" viewBox="0 0 24 24">
      <polygon points="5 3 19 12 5 21 5 3" fill="currentColor"></polygon>
    </symbol>

    <!-- pause icon -->
    <symbol id="icon-pause" viewBox="0 0 24 24">
      <rect x="6" y="4" width="4" height="16" fill="currentColor"></rect>
      <rect x="14" y="4" width="4" height="16" fill="currentColor"></rect>
    </symbol>

    <!-- skip-next icon -->
    <symbol id="icon-skip-next" viewBox="0 0 24 24">
      <polygon points="5 4 15 12 5 20 5 4" fill="currentColor"></polygon>
    </symbol>

    <!-- play-small icon -->
    <symbol id="icon-play-small" viewBox="0 0 24 24">
      <polygon points="5 3 19 12 5 21 5 3" fill="currentColor"></polygon>
    </symbol>

    <!-- volume icon -->
    <symbol id="icon-volume" viewBox="0 0 24 24">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="currentColor"></polygon>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07" fill="none" stroke="currentColor" stroke-width="2"></path>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14" fill="none" stroke="currentColor" stroke-width="2"></path>
    </symbol>

    <!-- expand icon -->
    <symbol id="icon-expand" viewBox="0 0 24 24">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="currentColor"></polygon>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07" fill="none" stroke="currentColor"
        stroke-width="2"></path>
    </symbol>

    <!-- prev icon -->
    <symbol id="icon-prev" viewBox="0 0 24 24">
      <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round" />
    </symbol>

    <!-- next icon -->
    <symbol id="icon-next" viewBox="0 0 24 24">
      <path d="M9 18L15 12L9 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </symbol>

    <!-- circle icon，中间空心 -->
    <symbol id="icon-circle" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="6" fill="none" stroke="currentColor" stroke-width="2" />
    </symbol>

    <!-- 🎧 icon -->
    <symbol id="icon-headphone" viewBox="0 0 24 24">
      <path d="M3 18v-6a9 9 0 0 1 18 0v6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z" fill="currentColor"/>
    </symbol>

    <!-- 更多 icon -->
    <symbol id="icon-more" viewBox="0 0 24 24">
      <path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>

    <!-- chevron-down -->
    <symbol id="icon-chevron-down" viewBox="0 0 24 24">
      <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>

    <!-- globe - 地球/语种图标 -->
    <symbol id="icon-globe" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="M2 12h20" stroke="currentColor" stroke-width="2" fill="none"/>
      <path d="M12 2a15 15 0 0 1 4 10 15 15 0 0 1-4 10 15 15 0 0 1-4-10 15 15 0 0 1 4-10" fill="none" stroke="currentColor" stroke-width="2"/>
    </symbol>

    <!-- music - 钢琴键盘/风格图标 -->
    <symbol id="icon-music" viewBox="0 0 24 24">
      <rect x="3" y="3" width="18" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2"/>
      <rect x="6" y="3" width="3" height="11" fill="currentColor"/>
      <rect x="11" y="3" width="3" height="11" fill="currentColor"/>
      <rect x="16" y="3" width="3" height="11" fill="currentColor"/>
    </symbol>

    <!-- coffee - 咖啡杯/场景图标 -->
    <symbol id="icon-coffee" viewBox="0 0 24 24">
      <path d="M4 8h12v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8z" fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="M16 10h2a2 2 0 0 1 0 4h-2" fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="M8 4c0 0 1-2 2-2s2 2 2 2" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M12 4c0 0 1-2 2-2s2 2 2 2" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
    </symbol>

    <!-- smile - 笑脸/情感图标 -->
    <symbol id="icon-smile" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="M8 16c1.5 1.5 3 2 4 2s2.5-.5 4-2" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
      <circle cx="9" cy="10" r="1.5" fill="currentColor"/>
      <circle cx="15" cy="10" r="1.5" fill="currentColor"/>
    </symbol>

    <!-- music-note - 音符/主题图标 -->
    <symbol id="icon-music-note" viewBox="0 0 24 24">
      <path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z" fill="currentColor"/>
    </symbol>

  </svg>
  <div id="app"></div>
  <script type="module" src="./src/main.ts"></script>
</body>

</html>
